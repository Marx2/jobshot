# Example jobs.yaml
jobs:
  - name: "Test container"
    description: "Run an alpine echo."
    container: "alpine:latest"
    entrypoint: ["/bin/sh", "-c"]
    parameters: ["echo 'Job completed successfully!'"]
    namespace: "pfire"
  - name: "Backup Database"
    description: "Run a one-time backup of the main database."
    container: "backup-db:latest"
    entrypoint: ["/bin/sh", "-c"]
    parameters:
      - "--db=main"
      - "--output=/backup"
    namespace: "pfire"
  - name: "Cleanup Temp Files"
    description: "Remove temporary files from all nodes."
    container: "cleanup:latest"
    entrypoint: ["/bin/sh", "-c"]
    parameters:
      - "--path=/tmp"
    namespace: "pfire"
  - name: "Generate Report"
    description: "Generate monthly usage report."
    container: "report-generator:latest"
    entrypoint: ["/bin/sh", "-c"]
    parameters:
      - "--month=10"
      - "--year=2025"
    namespace: "pfire"
  - name: "Scan single ticker scanst"
    description: "Run scan of single ticker."
    container: "ghcr.io/marx2/scanst:latest"
    entrypoint: ["python", "main.py"]
    parameters:
      - "MSFT"
    env:
      SCRAB_USERNAME: "your_username"
      SCRAB_PASSWORD: "your_password"
    namespace: "pfire"
  - name: "Database Backup with Credentials"
    description: "Backup database using credentials from secret"
    container: "backup-tool:latest"
    entrypoint: ["backup.sh"]
    parameters: []
    namespace: "pfire"
    secretName: "db-credentials"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  - name: "API Integration Job"
    description: "Job with both direct env vars and secret"
    container: "api-client:latest"
    entrypoint: ["python", "sync.py"]
    namespace: "pfire"
    env:
      LOG_LEVEL: "info"
      TIMEOUT: "30"
    secretName: "api-credentials"
